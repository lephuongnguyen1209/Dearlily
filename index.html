<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dearlily Master</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root {
            --hc-green: #9cc34a; /* Màu đặc trưng HelloChinese */
            --hc-bg: #fdfaf2;    /* Nền kem nhạt trong video */
            --grid-line: #e0d8c3;
        }
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--hc-bg); 
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }
        
        /* Header gọn nhẹ như video */
        .top-bar {
            width: 100%; padding: 10px 0;
            display: flex; justify-content: space-around;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(5px);
            font-weight: bold; color: #5d5246;
        }

        /* Khung viết có lưới 2 Layer */
        #writing-container {
            position: relative;
            width: 320px; height: 320px;
            margin-top: 50px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            /* Tạo lưới ô vuông mờ phía dưới */
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
                linear-gradient(rgba(224, 216, 195, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(224, 216, 195, 0.3) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 50% 50%, 50% 50%;
        }

        /* Thông tin từ vựng */
        .word-info {
            margin-top: 20px; text-align: center;
            color: #5d5246;
        }
        .meaning { font-size: 18px; font-weight: 500; margin-bottom: 5px; }

        /* Nút bấm tròn, đổ bóng nhẹ */
        .bottom-nav {
            position: fixed; bottom: 30px;
            width: 90%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
        }
        .btn {
            border: none; padding: 18px 0; border-radius: 50px;
            font-weight: bold; font-size: 14px;
            color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            transition: 0.1s;
        }
        .btn:active { transform: translateY(3px); box-shadow: none; }
        .btn-l { background: #9cc34a; }
        .btn-r { background: #64b5f6; }
        .btn-t { background: #ff8a65; }

        /* Hiệu ứng ẩn hiện */
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="top-bar">
    <span>⚡ <span id="energy-display">17</span></span>
    <span>Level: <span id="lv-display">0</span></span>
</div>

<div class="word-info">
    <div class="meaning" id="meaning-txt">SỐ TÁM (BĀ)</div>
</div>

<div id="writing-container">
    <div id="grid-canvas"></div>
</div>

<div class="bottom-nav">
    <button class="btn btn-l" onclick="changeMode('learn')">HỌC</button>
    <button class="btn btn-r" onclick="changeMode('review')">ÔN TẬP</button>
    <button class="btn btn-t" onclick="changeMode('test')">KIỂM TRA</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD5rrTKwBjfGT-M6vVl2RJEM5o7Y2vCOJo",
        authDomain: "dearlily-8d71f.firebaseapp.com",
        databaseURL: "https://dearlily-8d71f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "dearlily-8d71f",
        appId: "1:517365172899:web:48e3efa1651159b412cd16"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const userRef = ref(db, 'userData');

    let writer;
    let currentMode = 'learn';
    let currentWord = '八'; // Từ trong video của bạn

    // Load dữ liệu
    onValue(userRef, (snapshot) => {
        if (snapshot.exists()) {
            const data = snapshot.val();
            document.getElementById('energy-display').innerText = data.energy;
            document.getElementById('lv-display').innerText = data.words[currentWord]?.lv || 0;
        }
    });

    window.changeMode = (mode) => {
        currentMode = mode;
        initWriter(currentWord);
    };

    function initWriter(word) {
        document.getElementById('grid-canvas').innerHTML = '';
        
        writer = HanziWriter.create('grid-canvas', word, {
            width: 320, height: 320, padding: 20,
            showOutline: true,
            strokeColor: '#333', // Màu nét vẽ
            outlineColor: '#eee', // Nét mờ tầng dưới
            drawingColor: '#9cc34a', // Nét đang vẽ màu xanh như video
            drawingWidth: 25, // Độ dày nét vẽ cho giống video
            showCharacter: (currentMode === 'learn'), // Chỉ hiện chữ mẫu khi ở mode Learn
        });

        writer.quiz({
            onComplete: () => {
                alert("Xuất sắc! Bạn đã hoàn thành chữ này.");
                // Logic cộng điểm/level ở đây
            }
        });
    }

    // Khởi tạo lần đầu
    initWriter(currentWord);

</script>
</body>
</html>
