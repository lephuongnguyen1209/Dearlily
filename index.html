<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dearlily Hanzi Master</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root { --bg: #fdfaf2; --hc-green: #9cc34a; --text: #5d5246; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; color: var(--text); }
        
        /* Giao diện Header */
        .header { width: 100%; padding: 15px 0; background: #fff; display: flex; justify-content: space-around; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* Khung viết */
        #writing-area { display: none; flex-direction: column; align-items: center; width: 100%; }
        #grid-canvas { background: white; border-radius: 20px; margin: 20px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        /* Danh sách từ vựng */
        .lib-container { width: 90%; max-width: 400px; margin-top: 20px; }
        .word-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px; }
        .word-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); font-size: 24px; cursor: pointer; }

        .btn-back { margin-top: 20px; padding: 10px 25px; border-radius: 20px; border: none; background: #eee; font-weight: bold; }
    </style>
</head>
<body>

    <div id="home-screen" class="lib-container">
        <div style="font-size: 20px; font-weight: bold;">DANH SÁCH TỪ VỰNG</div>
        <div class="word-grid" id="word-list">
            </div>
    </div>

    <div id="writing-area">
        <div class="header">
            <span onclick="goBack()" style="cursor:pointer">← Thoát</span>
            <span id="current-char-display">Đang học</span>
            <span>⚡ 17</span>
        </div>
        <div id="grid-canvas"></div>
        <div id="msg" style="font-weight: bold; color: var(--hc-green);">Hãy đồ theo nét mờ</div>
        <button class="btn-back" onclick="writer.animateCharacter()">XEM GỢI Ý</button>
    </div>

<script>
    const myWords = [
        { char: '你', pinyin: 'nǐ', mean: 'Bạn' },
        { char: '好', pinyin: 'hǎo', mean: 'Tốt' },
        { char: '一', pinyin: 'yī', mean: 'Số 1' },
        { char: '八', pinyin: 'bā', mean: 'Số 8' },
        { char: '西', pinyin: 'xī', mean: 'Tây' },
        { char: '学', pinyin: 'xué', mean: 'Học' }
    ];

    let writer;

    // Hiển thị danh sách từ
    const listDiv = document.getElementById('word-list');
    myWords.forEach(item => {
        const card = document.createElement('div');
        card.className = 'word-card';
        card.innerText = item.char;
        card.onclick = () => startWriting(item.char);
        listDiv.appendChild(card);
    });

    function startWriting(char) {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('writing-area').style.display = 'flex';
        document.getElementById('current-char-display').innerText = char;
        
        document.getElementById('grid-canvas').innerHTML = '';
        writer = HanziWriter.create('grid-canvas', char, {
            width: 300, height: 300, padding: 20,
            showOutline: true,
            strokeColor: '#000',      // Nét máy hiện ra khi "Xem gợi ý"
            outlineColor: '#f0f0f0',  // Layer mờ bên dưới
            drawingColor: '#333',     // MÀU NÉT VẼ TAY (Sẽ giữ nguyên trên màn hình)
            drawingWidth: 20,
            showCharacter: false      // Bắt đầu bằng khung trống để tự viết
        });

        writer.quiz({
            onCorrectStroke: function(data) {
                document.getElementById('msg').innerText = "Đúng rồi! Tiếp tục nào.";
            },
            onComplete: function() {
                document.getElementById('msg').innerText = "Hoàn thành xuất sắc!";
            }
        });
    }

    function goBack() {
        document.getElementById('home-screen').style.display = 'block';
        document.getElementById('writing-area').style.display = 'none';
    }
</script>
</body>
</html>
