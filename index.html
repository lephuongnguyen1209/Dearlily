<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dearlily Hanzi Master</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --energy-bg: #fff9db;
            --energy-text: #fab005;
            --btn-learn: #c3e6cb;
            --btn-review: #bcd4f3;
            --btn-test: #f5b7b1;
            --text: #495057;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; color: var(--text); }
        
        /* Năng lượng kiểu Capsule */
        .energy-badge { background: var(--energy-bg); color: var(--energy-text); padding: 8px 25px; border-radius: 30px; font-weight: bold; font-size: 20px; margin-bottom: 40px; display: flex; align-items: center; gap: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .title { font-size: 28px; font-weight: 300; letter-spacing: 2px; margin-bottom: 30px; color: #868e96; }

        /* Nút bấm kiểu Card */
        .main-btns { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 15px; }
        .btn { border: none; padding: 20px; border-radius: 20px; font-size: 16px; font-weight: bold; text-transform: uppercase; color: #5a6268; box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-cloud { background: #f1f3f5; color: #adb5bd; font-size: 12px; padding: 10px; }
        .btn-l { background: var(--btn-learn); }
        .btn-r { background: var(--btn-review); }
        .btn-t { background: var(--btn-test); }

        /* Khung vẽ ẩn đi khi ở ngoài màn hình chính */
        #draw-area { display: none; width: 100%; flex-direction: column; align-items: center; }
        #grid-canvas { background: white; border-radius: 25px; margin: 20px 0; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        /* Thư viện từ vựng */
        .library-section { width: 100%; max-width: 350px; margin-top: 40px; border-top: 2px dashed #dee2e6; padding-top: 20px; }
        .lib-title { font-size: 14px; font-weight: bold; color: #adb5bd; margin-bottom: 15px; text-transform: uppercase; }
        .word-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .word-card { background: white; padding: 15px; border-radius: 15px; text-align: center; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .word-card .char { font-size: 24px; }
        .word-card .lv { position: absolute; top: -5px; right: -5px; background: #ced4da; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="energy-badge">⚡ <span id="energy-val">17</span></div>
        <div class="title">DEARLILY MASTER</div>
        
        <div class="main-btns">
            <button class="btn btn-cloud">ĐỒNG BỘ LÊN CLOUD</button>
            <button class="btn btn-l" onclick="startApp('learn')">LEARN (3 BƯỚC)</button>
            <button class="btn btn-r" onclick="startApp('review')">REVIEW (3 BƯỚC)</button>
            <button class="btn btn-t" onclick="startApp('test')">TEST (CHỈ VIẾT)</button>
        </div>

        <div class="library-section">
            <div class="lib-title">THƯ VIỆN</div>
            <div class="word-grid" id="word-list">
                </div>
        </div>
    </div>

    <div id="draw-area">
        <div class="energy-badge">🌹 <span id="energy-draw">0</span></div>
        <div id="grid-canvas"></div>
        <div id="msg" style="text-align:center; font-weight:bold; color:#868e96"></div>
        <button class="btn btn-cloud" style="margin-top:20px" onclick="location.reload()">QUAY LẠI</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5rrTKwBjfGT-M6vVl2RJEM5o7Y2vCOJo",
            authDomain: "dearlily-8d71f.firebaseapp.com",
            databaseURL: "https://dearlily-8d71f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dearlily-8d71f",
            appId: "1:517365172899:web:48e3efa1651159b412cd16"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const userRef = ref(db, 'userData');

        let userData = { energy: 17, words: { "学": { lv: 0, mstr: false } } };

        onValue(userRef, (snapshot) => {
            if (snapshot.exists()) {
                userData = snapshot.val();
                document.getElementById('energy-val').innerText = userData.energy;
                renderLibrary();
            }
        });

        function renderLibrary() {
            const list = document.getElementById('word-list');
            list.innerHTML = '';
            for (let char in userData.words) {
                list.innerHTML += `<div class="word-card"><div class="lv">Lv.${userData.words[char].lv}</div><div class="char">${char}</div></div>`;
            }
        }

        window.startApp = (mode) => {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('draw-area').style.display = 'flex';
            document.getElementById('energy-draw').innerText = userData.energy;
            // Ở đây sẽ chạy tiếp logic Hanzi Writer như code cũ...
        };
    </script>
</body>
</html>
