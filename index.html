<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Viết Chữ Hán</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f4f9; padding-top: 50px; }
        #target-kanji { background: white; border: 2px solid #333; border-radius: 8px; cursor: crosshair; }
        .info { margin: 20px; text-align: center; }
        .controls { display: flex; gap: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; }
        button:hover { background-color: #e0e0e0; }
        .pinyin { font-size: 24px; color: #d32f2f; font-weight: bold; }
        .meaning { font-size: 18px; color: #555; }
    </style>
</head>
<body>

    <div class="info">
        <div id="pinyin" class="pinyin">nǐ</div>
        <div id="meaning" class="meaning">Bạn, anh, chị</div>
    </div>

    <div id="target-kanji"></div>

    <div class="controls" style="margin-top: 20px;">
        <button onclick="prevWord()">Trước</button>
        <button onclick="writer.animateCharacter()">Xem hướng dẫn</button>
        <button onclick="nextWord()">Sau</button>
    </div>

    <script>
        // Danh sách từ vựng mẫu (Sau này bạn có thể thay bằng file JSON)
        const vocabulary = [
            { char: '你', pinyin: 'nǐ', meaning: 'Bạn, anh, chị' },
            { char: '好', pinyin: 'hǎo', meaning: 'Tốt, khỏe' },
            { char: '学', pinyin: 'xué', meaning: 'Học' },
            { char: '习', pinyin: 'xí', meaning: 'Tập' }
        ];

        let currentIndex = 0;
        let writer;

        function initWriter(wordObj) {
            // Xóa nội dung cũ trong ô vẽ
            document.getElementById('target-kanji').innerHTML = '';
            document.getElementById('pinyin').innerText = wordObj.pinyin;
            document.getElementById('meaning').innerText = wordObj.meaning;

            // Khởi tạo Hanzi Writer
            writer = Hanzi Writer.create('target-kanji', wordObj.char, {
                width: 300,
                height: 300,
                showCharacter: false, // Ẩn chữ gốc để người dùng tự vẽ
                padding: 15,
                strokeColor: '#2196F3', // Màu nét vẽ đúng
                radicalColor: '#f44336' // Màu bộ thủ nếu muốn hiện
            });

            // Bật chế độ kiểm tra nét vẽ (Quiz)
            writer.quiz();
        }

        function nextWord() {
            if (currentIndex < vocabulary.length - 1) {
                currentIndex++;
                initWriter(vocabulary[currentIndex]);
            }
        }

        function prevWord() {
            if (currentIndex > 0) {
                currentIndex--;
                initWriter(vocabulary[currentIndex]);
            }
        }

        // Chạy lần đầu tiên
        initWriter(vocabulary[currentIndex]);
    </script>
</body>
</html>
