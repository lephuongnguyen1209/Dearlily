<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hán Ngữ Skritter Clone</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root { --primary: #2196F3; --success: #4CAF50; --bg: #fdf6e3; --text: #5c4b37; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; color: var(--text); }
        
        /* Navigation */
        nav { background: #5c4b37; width: 100%; display: flex; justify-content: center; gap: 15px; padding: 12px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        nav button { background: none; border: 1px solid #eee; color: white; padding: 8px 15px; cursor: pointer; border-radius: 20px; transition: 0.3s; }
        nav button.active { background: #eee; color: #5c4b37; font-weight: bold; }

        .container { max-width: 600px; width: 90%; margin-top: 20px; display: none; text-align: center; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .container.active { display: block; }

        /* Danh sách từ */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
        .vocab-item { background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; position: relative; }
        .vocab-item b { font-size: 24px; margin-bottom: 5px; }
        .mastered { border: 2px solid var(--success); background: #f0fff0; }
        .score-badge { font-size: 12px; background: #eee; padding: 2px 6px; border-radius: 10px; margin-top: 5px; }

        /* Bảng vẽ */
        #writer-container { background: white; border: 2px solid #5c4b37; border-radius: 10px; display: inline-block; margin: 20px 0; position: relative; line-height: 0; }
        .step-indicator { color: var(--primary); font-weight: bold; margin-bottom: 10px; font-size: 1.1em; }
        .pinyin { font-size: 32px; color: #d32f2f; font-weight: bold; margin-bottom: 5px; }
        .meaning { font-size: 20px; color: #666; font-style: italic; }
        
        button.action-btn { padding: 12px 25px; font-size: 16px; cursor: pointer; border-radius: 25px; border: none; background: var(--primary); color: white; margin: 5px; transition: 0.2s; }
        button.action-btn:hover { opacity: 0.8; }
        button.secondary { background: #9e9e9e; }
    </style>
</head>
<body>

<nav>
    <button onclick="showTab('tab-list')" id="btn-list" class="active">DS Từ Vựng</button>
    <button onclick="showTab('tab-learn')" id="btn-learn">Học Từ</button>
    <button onclick="showTab('tab-quiz')" id="btn-quiz">Ôn Tập</button>
</nav>

<div id="tab-list" class="container active">
    <h3>Dữ liệu Giáo trình Hán ngữ</h3>
    <p id="total-info"></p>
    <div id="vocab-list-render" class="vocab-grid"></div>
</div>

<div id="tab-learn" class="container">
    <div class="step-indicator" id="learn-step-text">Bước 1: Tập viết theo nét</div>
    <div class="info-box">
        <div id="learn-pinyin" class="pinyin"></div>
        <div id="learn-meaning" class="meaning"></div>
    </div>
    <div id="writer-container"><div id="learn-writer"></div></div>
    <div>
        <button class="action-btn secondary" onclick="prevLearn()">Trở lại</button>
        <button class="action-btn" onclick="nextLearn()">Bỏ qua / Tiếp</button>
    </div>
</div>

<div id="tab-quiz" class="container">
    <div id="quiz-header" style="font-weight: bold; color: #5c4b37;">Ôn tập 15 từ ngẫu nhiên (Score < 10)</div>
    <div id="quiz-count" style="margin: 10px; color: #888;"></div>
    <div class="info-box">
        <div id="quiz-pinyin" class="pinyin"></div>
        <div id="quiz-meaning" class="meaning"></div>
    </div>
    <div id="writer-container"><div id="quiz-writer"></div></div>
</div>

<script>
    // DATA TỪ 3 ẢNH BẠN GỬI (Gồm Bài 1 và các từ bài sau)
    const rawData = [
        // Ảnh 1: Bài 1 cơ bản
        { id: 1, char: '你', pinyin: 'nǐ', meaning: 'Bạn, anh, chị' },
        { id: 2, char: '好', pinyin: 'hǎo', meaning: 'Tốt, khỏe' },
        { id: 3, char: '一', pinyin: 'yī', meaning: 'Số 1' },
        { id: 4, char: '五', pinyin: 'wǔ', meaning: 'Số 5' },
        { id: 5, char: '八', pinyin: 'bā', meaning: 'Số 8' },
        { id: 6, char: '大', pinyin: 'dà', meaning: 'Lớn, to' },
        { id: 7, char: '不', pinyin: 'bù', meaning: 'Không (phủ định)' },
        { id: 8, char: '口', pinyin: 'kǒu', meaning: 'Miệng, họng' },
        { id: 9, char: '白', pinyin: 'bái', meaning: 'Trắng' },
        { id: 10, char: '女', pinyin: 'nǚ', meaning: 'Nữ, con gái' },
        { id: 11, char: '马', pinyin: 'mǎ', meaning: 'Con ngựa' },
        
        // Ảnh 2 & 3: Các từ vựng bài tiếp theo (Địa điểm, Ngôn ngữ)
        { id: 12, char: '邮局', pinyin: 'yóujú', meaning: 'Bưu điện' },
        { id: 13, char: '寄', pinyin: 'jì', meaning: 'Gửi (thư, đồ)' },
        { id: 14, char: '信', pinyin: 'xìn', meaning: 'Thư, tin nhắn' },
        { id: 15, char: '银行', pinyin: 'yínháng', meaning: 'Ngân hàng' },
        { id: 16, char: '取', pinyin: 'qǔ', meaning: 'Rút, lấy (tiền)' },
        { id: 17, char: '钱', pinyin: 'qián', meaning: 'Tiền' },
        { id: 18, char: '明天', pinyin: 'míngtiān', meaning: 'Ngày mai' },
        { id: 19, char: '见', pinyin: 'jiàn', meaning: 'Gặp, thấy' },
        { id: 20, char: '六', pinyin: 'liù', meaning: 'Số 6' },
        { id: 21, char: '七', pinyin: 'qī', meaning: 'Số 7' },
        { id: 22, char: '九', pinyin: 'jiǔ', meaning: 'Số 9' },
        { id: 23, char: '学', pinyin: 'xué', meaning: 'Học' },
        { id: 24, char: '英语', pinyin: 'yīngyǔ', meaning: 'Tiếng Anh' },
        { id: 25, char: '阿拉伯语', pinyin: 'ālābóyǔ', meaning: 'Tiếng Ả Rập' },
        { id: 26, char: '德语', pinyin: 'déyǔ', meaning: 'Tiếng Đức' },
        { id: 27, char: '俄语', pinyin: 'éyǔ', meaning: 'Tiếng Nga' },
        { id: 28, char: '法语', pinyin: 'fǎyǔ', meaning: 'Tiếng Pháp' },
        { id: 29, char: '韩国语', pinyin: 'hánguóyǔ', meaning: 'Tiếng Hàn' },
        { id: 30, char: '日语', pinyin: 'rìyǔ', meaning: 'Tiếng Nhật' },
        { id: 31, char: '西班牙语', pinyin: 'xībānyáyǔ', meaning: 'Tiếng TBN' },
        { id: 32, char: '去', pinyin: 'qù', meaning: 'Đi' },
        { id: 33, char: '对', pinyin: 'duì', meaning: 'Đúng, đối với' }
    ];

    let userProgress = JSON.parse(localStorage.getItem('hsk_progress')) || {};
    rawData.forEach(item => { if (!userProgress[item.id]) userProgress[item.id] = { score: 0 }; });

    let currentLearnIdx = 0;
    let currentLearnStep = 1; 
    let learnWriter, quizWriter;
    let quizList = [];
    let currentQuizIdx = 0;

    function showTab(tabId) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.getElementById('btn-' + tabId.split('-')[1]).classList.add('active');
        if (tabId === 'tab-list') renderVocabList();
        if (tabId === 'tab-learn') startLearn();
        if (tabId === 'tab-quiz') startQuiz();
    }

    function renderVocabList() {
        const listDiv = document.getElementById('vocab-list-render');
        const masteredCount = rawData.filter(i => userProgress[i.id].score >= 10).length;
        document.getElementById('total-info').innerText = `Tổng: ${rawData.length} từ | Đã thuộc: ${masteredCount}`;
        
        listDiv.innerHTML = rawData.map(item => `
            <div class="vocab-item ${userProgress[item.id].score >= 10 ? 'mastered' : ''}">
                <b>${item.char}</b>
                <span>${item.pinyin}</span>
                <div class="score-badge">⭐ ${userProgress[item.id].score}/10</div>
            </div>
        `).join('');
    }

    function startLearn() {
        const item = rawData[currentLearnIdx];
        document.getElementById('learn-pinyin').innerText = item.pinyin;
        document.getElementById('learn-meaning').innerText = item.meaning;
        updateLearnStep();
    }

    function updateLearnStep() {
        const item = rawData[currentLearnIdx];
        const container = document.getElementById('learn-writer');
        container.innerHTML = '';
        
        let config = { width: 280, height: 280, padding: 15, strokeColor: '#2196F3', radicalColor: '#f44336' };
        
        if (currentLearnStep === 1) {
            document.getElementById('learn-step-text').innerText = "Bước 1: Viết theo nét hướng dẫn";
            config.showCharacter = true;
            learnWriter = Hanzi Writer.create('learn-writer', item.char[0], config);
            learnWriter.animateCharacter();
        } else if (currentLearnStep === 2) {
            document.getElementById('learn-step-text').innerText = "Bước 2: Viết đè lên chữ mờ";
            config.showCharacter = true;
            config.characterOutlineColor = '#ddd'; 
            learnWriter = Hanzi Writer.create('learn-writer', item.char[0], config);
        } else {
            document.getElementById('learn-step-text').innerText = "Bước 3: Tự nhớ để viết (Bảng trắng)";
            config.showCharacter = false;
            learnWriter = Hanzi Writer.create('learn-writer', item.char[0], config);
        }

        learnWriter.quiz({
            onComplete: () => {
                if (currentLearnStep < 3) {
                    currentLearnStep++;
                    setTimeout(updateLearnStep, 600);
                } else {
                    currentLearnStep = 1;
                    nextLearn();
                }
            }
        });
    }

    function nextLearn() {
        if (currentLearnIdx < rawData.length - 1) {
            currentLearnIdx++;
            currentLearnStep = 1;
            startLearn();
        } else {
            alert("Bạn đã xem hết danh sách từ học!");
            currentLearnIdx = 0;
            showTab('tab-list');
        }
    }

    function prevLearn() {
        if (currentLearnIdx > 0) {
            currentLearnIdx--;
            currentLearnStep = 1;
            startLearn();
        }
    }

    function startQuiz() {
        quizList = rawData
            .filter(item => userProgress[item.id].score < 10)
            .sort(() => 0.5 - Math.random())
            .slice(0, 15);
        
        if (quizList.length === 0) {
            alert("Chúc mừng! Bạn đã 'Master' tất cả các từ (đều 10 điểm)!");
            showTab('tab-list');
            return;
        }
        currentQuizIdx = 0;
        renderQuiz();
    }

    function renderQuiz() {
        const item = quizList[currentQuizIdx];
        document.getElementById('quiz-count').innerText = `Từ ${currentQuizIdx + 1}/${quizList.length}`;
        document.getElementById('quiz-pinyin').innerText = item.pinyin;
        document.getElementById('quiz-meaning').innerText = item.meaning;
        
        document.getElementById('quiz-writer').innerHTML = '';
        quizWriter = Hanzi Writer.create('quiz-writer', item.char[0], {
            width: 280, height: 280, showCharacter: false, padding: 15, strokeColor: '#4CAF50'
        });

        quizWriter.quiz({
            onComplete: () => {
                userProgress[item.id].score++;
                localStorage.setItem('hsk_progress', JSON.stringify(userProgress));
                setTimeout(() => {
                    if (currentQuizIdx < quizList.length - 1) {
                        currentQuizIdx++;
                        renderQuiz();
                    } else {
                        alert("Xong bài ôn tập! Điểm của bạn đã được cập nhật.");
                        showTab('tab-list');
                    }
                }, 600);
            }
        });
    }

    renderVocabList();
</script>
</body>
</html>
