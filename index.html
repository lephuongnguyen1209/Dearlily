<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html>
<html b:css='false' b:defaultmessages='false' b:layouts='false' xmlns='http://www.w3.org/1999/xhtml' xmlns:b='http://www.google.com/2005/gml/b' xmlns:data='http://www.google.com/atom/ns#' xmlns:expr='http://www.google.com/2005/gml/expr'>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Hanzi Master Pro</title>
    <b:skin><![CDATA[
        :root { --bg: #fdfaf2; --text: #5d5246; --accent: #9cc34a; }
        body { background: var(--bg); margin: 0; padding: 10px; font-family: -apple-system, sans-serif; }
        .app-container { max-width: 420px; margin: auto; background: #fff; padding: 25px; border-radius: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); text-align: center; }
        .energy-tag { background: #ffecb3; padding: 5px 15px; border-radius: 50px; font-weight: bold; font-size: 14px; margin-bottom: 20px; display: inline-block; }
        
        /* Container Layer */
        .writer-box { 
            position: relative; width: 300px; height: 300px; margin: 20px auto; 
            background: #fff; border-radius: 20px; border: 2px solid #f0f0f0;
            background-image: linear-gradient(#e0d8c3 1px, transparent 1px), linear-gradient(90deg, #e0d8c3 1px, transparent 1px);
            background-size: 50% 50%;
        }
        .layer { position: absolute; inset: 0; }
        #layer-target { z-index: 1; opacity: 0.2; } /* Chữ mờ layer dưới */
        #layer-quiz { z-index: 2; } /* Nét vẽ của bạn layer trên */
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 15px; border-radius: 15px; border: none; font-weight: bold; color: white; cursor: pointer; }
        .btn-l { background: #9cc34a; }
        .btn-r { background: #b4d4ff; }
        .btn-t { background: #ffb7b7; }
    ]]></b:skin>
</head>
<body>
    <b:section id='content'>
        <b:widget id='Text1' locked='false' type='Text'>
            <b:includable id='main'>
                <div class='app-container'>
                    <div class='energy-tag'>⚡ <span id='e-ui'>20</span></div>
                    
                    <div id='work-area'>
                        <h1 id='mean' style='font-weight: 200; margin: 10px 0;'>学 - Học</h1>
                        <div class='writer-box'>
                            <div id='layer-target' class='layer'></div>
                            <div id='layer-quiz' class='layer'></div>
                        </div>
                        <div id='status' style='color: var(--accent); font-weight: bold; min-height: 20px;'></div>
                        
                        <div class='btn-group'>
                            <button class='btn btn-l' onclick="start('学')">HỌC</button>
                            <button class='btn btn-r' onclick="writer.animateCharacter()">XEM</button>
                            <button class='btn btn-t' onclick="location.reload()">THOÁT</button>
                        </div>
                    </div>
                </div>
            </b:includable>
        </b:widget>
    </b:section>

    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <script>
        let writer;
        
        function start(char) {
            document.getElementById('layer-target').innerHTML = '';
            document.getElementById('layer-quiz').innerHTML = '';
            
            // 1. Tạo lớp chữ mờ nằm dưới
            HanziWriter.create('layer-target', char, {
                width: 300, height: 300, padding: 30,
                showOutline: true, strokeColor: '#000'
            });

            // 2. Tạo lớp Quiz nằm trên để bắt nét vẽ
            writer = HanziWriter.create('layer-quiz', char, {
                width: 300, height: 300, padding: 30,
                showOutline: false,
                showCharacter: false,
                // ĐẶC BIỆT CẦN THIẾT:
                drawingColor: '#333',         // Màu mực bạn đang vẽ
                drawingWidth: 25,             // Độ dày mực
                drawingFadeDuration: 0,       // GIỮ NÉT VẼ TAY LẠI (Không cho phai đi)
                highlightCompleteColor: '#333', // Giữ màu đen khi hoàn thành nét
                strokeHighlightSpeed: 0,      // Không cho máy vẽ đè lên
                lenience: 1.5
            });

            writer.quiz({
                onCorrectStroke: (data) => {
                    document.getElementById('status').innerText = "Đúng rồi!";
                },
                onComplete: (data) => {
                    document.getElementById('status').innerText = "Hoàn thành!";
                }
            });
        }

        window.onload = () => start('学');
    </script>
</body>
</html>
