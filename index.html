<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing To My Future</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        #app-container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        #target-kanji { width: 200px; height: 200px; margin: 20px auto; border: 1px solid #ddd; background: #fff; }
        .btn { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

<div id-container>
    <h1>Học Viết Tiếng Trung</h1>
    <div id="word-info">
        <h2 id="pinyin">Đang tải...</h2>
        <p id="meaning"></p>
    </div>
    
    <div id="target-kanji"></div>

    <div id="controls">
        <button class="btn" onclick="startStep1()">Bắt đầu học (Bước 1)</button>
    </div>
</div>

<script>
    // THAY LINK SCRIPT CỦA BẠN VÀO ĐÂY
    const API_URL = "https://script.google.com/macros/s/AKfycbxOeGkwWjiE2Jrzk3J6EoZEaNOriL7VB9iSYr_hU3jzbIBgaA13JgpY9EphLnmqVLNkhA/exec";
    
    let currentWord = "";
    let writer;

    // 1. Hàm lấy dữ liệu từ Google Sheets
    async function fetchData() {
        const response = await fetch(API_URL);
        const data = await response.json();
        // Lấy thử từ đầu tiên trong danh sách
        currentWord = data[0];
        displayWord(currentWord);
    }

    function displayWord(word) {
        document.getElementById('pinyin').innerText = word["PINYIN"];
        document.getElementById('meaning').innerText = word["NGHĨA"];
        
        // Khởi tạo Hanzi Writer cho chữ Hán đó
        writer = HanziWriter.create('target-kanji', word["CHỮ HÁN"], {
            width: 200,
            height: 200,
            padding: 5,
            showOutline: true,
            strokeAnimationSpeed: 1,
            delayBetweenStrokes: 500
        });
    }

    // 2. Logic Bước 1: Animation và cho phép vẽ song song
    function startStep1() {
        if (!writer) return;
        
        // Chạy animation hướng dẫn
        writer.animateCharacter();
        
        // Bật chế độ cho phép người dùng vẽ theo (Quiz mode)
        writer.quiz({
            onComplete: function(data) {
                alert("Hoàn thành bước 1! Bạn đã viết đúng nét.");
            }
        });
    }

    // Gọi hàm fetch khi trang web vừa mở
    fetchData();
</script>

</body>
</html>
